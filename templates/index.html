<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<title>Private Chat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #1e1e2e, #3a3a5e);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1E1E2E;
  color: white;
  padding: 15px 20px;
  font-size: 22px;
  font-weight: bold;
  width: 100vw;
  position: absolute;
  top: 0;
}

.icons a {
  color: white;
  font-size: 22px;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.icons a:hover {
  color: #FFC107;
  transform: scale(1.2);
}

h2, h3 {
  text-align: center;
  margin-bottom: 10px;
}

/* LINK STYLING FOR LOGOUT */
h2 a {
  color: #ff6b6b;
  text-decoration: none;
  font-size: 14px;
  font-weight: normal;
  margin-left: 10px;
  border: 1px solid #ff6b6b;
  padding: 2px 8px;
  border-radius: 4px;
}

h2 a:hover {
  background: #ff6b6b;
  color: white;
}

/* USER LIST CONTAINER (Replacing Select) */
#userList {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  width: 100%;
  max-width: 500px; /* Matches chat width */
  margin-bottom: 15px;
}

/* INDIVIDUAL USER CARD */
.user-item {
  background: #444;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 14px;
  border: 1px solid transparent;
}

.user-item:hover {
  background: #555;
  transform: translateY(-2px);
  border-color: #666;
}

/* ACTIVE STATE (When a user is selected) */
.user-item.active {
  background: #4CAF50;
  color: white;
  box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4);
}

#chat {
  width: 100%;
  max-width: 500px;
  height: 60vh;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

/* Scrollbar styling for chat */
#chat::-webkit-scrollbar {
  width: 6px;
}
#chat::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
}

/* FIXED */
.message-container {
  display: flex;
  width: 100%;
  margin: 8px 0;
}

.message {
  padding: 12px 16px;
  border-radius: 20px;
  max-width: 70%;
  font-size: 14px;
  word-wrap: break-word;
}

.sent {
  background: #4CAF50;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.received {
  background: #555;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.chat-input {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 500px;
  margin-top: 10px;
  background: #222;
  border-radius: 30px;
  padding: 5px;
  border: 1px solid #444;
}

input[type="text"] {
  flex: 1;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: transparent;
  color: white;
  outline: none;
}

.send-button {
  background: #4CAF50;
  border: none;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
  margin-left: 5px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send-button:hover {
  background: #45a049;
  transform: scale(1.05);
}

.send-button img {
  width: 20px;
  height: 20px;
  filter: brightness(0) invert(1); /* Makes icon white */
}

</style>
</head>

<body>

<header>
  <h1>Text-Talk</h1>
  <div class="icons">
    <a href="https://instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://github.com/" target="_blank"><i class="fab fa-github"></i></a>
  </div>
</header>

<!-- Added some top margin to body content so it doesn't hide behind fixed header -->
<div style="margin-top: 70px; width: 100%; display: flex; flex-direction: column; align-items: center;">

  <h2>
    Welcome <span id="username-display"></span>!
    <a href="#" onclick="logout()">Logout</a>
  </h2>

  <h3>Select a user to chat with:</h3>

  <!-- OLD SELECT REMOVED, NEW LIST ADDED -->
  <div id="userList">
    <!-- Users will be injected here by JS -->
    <div style="color: #aaa; font-size: 14px;">Loading users...</div>
  </div>

  <div id="chat">
    <!-- Messages go here -->
  </div>

  <div class="chat-input">
    <input type="text" id="message" placeholder="Type a message..." onkeypress="handleKeyPress(event)" autocomplete="off">
    <button class="send-button" onclick="sendMessage()">
      <img src="https://cdn-icons-png.flaticon.com/512/724/724927.png" alt="Send">
    </button>
  </div>

</div>

<script>
let socket = null;
let receiver = "";
const currentUser = localStorage.getItem("username");

document.getElementById("username-display").textContent = currentUser || "";

if (!currentUser) {
  window.location.href = "login.html";
}

/* USERS */
async function loadUsers() {
  try {
    const res = await fetch("https://text-talk1.onrender.com/api/users", {
      credentials: "include"
    });

    const data = await res.json();
    const listContainer = document.getElementById("userList");
    listContainer.innerHTML = ""; // Clear loading text

    if (!data.users || data.users.length === 0) {
      listContainer.innerHTML = "<div style='color:#aaa'>No users found.</div>";
      return;
    }

    (data.users || []).forEach(u => {
      // Skip showing current user in the list (optional, but usually better UX)
      if (u.username === currentUser) return;

      const div = document.createElement("div");
      div.className = "user-item";
      div.textContent = u.username;
      div.dataset.username = u.username;
      
      // Add click event
      div.addEventListener("click", () => {
        selectUser(u.username, div);
      });

      listContainer.appendChild(div);
    });
  } catch (err) {
    console.error("Failed to load users:", err);
    document.getElementById("userList").innerHTML = "<div style='color:#ff6b6b'>Error loading users.</div>";
  }
}

/* SELECT USER LOGIC */
function selectUser(username, element) {
  // If clicking the same user, do nothing
  if (receiver === username) return;

  receiver = username;

  // Update Visuals: Remove 'active' class from all, add to clicked
  document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));
  element.classList.add("active");

  // Reset Chat
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = ""; // Clear previous messages
  
  // Connect
  if (socket) {
    socket.close();
  }
  joinChat();
  loadChat();
}

/* CONNECT WEBSOCKET */
function joinChat() {
  if (!receiver) return;

  // Note: Ensure your backend supports standard WebSocket or Socket.io properly. 
  // The original code used `new WebSocket` but included socket.io script.
  // Keeping WebSocket logic as per your original request.
  
  socket = new WebSocket(
    `wss://text-talk1.onrender.com/ws/chat/${receiver}`
  );

  socket.onopen = () => {
    console.log("WebSocket connected to", receiver);
  };

  socket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      displayMessage(
        data.sender,
        data.content,
        data.timestamp
      );
    } catch (e) {
      console.error("Error parsing message", e);
    }
  };

  socket.onclose = () => {
    console.log("WebSocket closed");
  };

  socket.onerror = (err) => {
    console.error("WebSocket Error", err);
  };
}

/* LOAD CHAT HISTORY */
async function loadChat() {
  if (!receiver) return;

  try {
    const res = await fetch(
      `https://text-talk1.onrender.com/api/messages/${receiver}`,
      { credentials: "include" }
    );

    const data = await res.json();
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = ""; // Ensure clean slate before loading history

    (data.messages || []).forEach(msg => {
      displayMessage(msg.sender, msg.content, msg.timestamp);
    });
  } catch (err) {
    console.error("Error loading chat history", err);
  }
}

/* SEND MESSAGE */
function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value.trim();

  if (!message) return; // Allow empty send check if not connected yet
  
  // Show message immediately in UI (Optimistic UI)
  if (receiver) {
      displayMessage(currentUser, message, new Date().toLocaleTimeString());
  }

  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({
      message: message
    }));
  } else {
    console.warn("Socket is not connected.");
  }

  input.value = "";
}

/* ENTER KEY */
function handleKeyPress(e) {
  if (e.key === "Enter") sendMessage();
}

/* UI */
function displayMessage(sender, message, timestamp) {
  const chatDiv = document.getElementById("chat");

  const container = document.createElement("div");
  container.className = "message-container";

  const bubble = document.createElement("div");
  bubble.className = "message";

  const isMine = sender === currentUser;
  const displayName = isMine ? "You" : sender;

  bubble.classList.add(isMine ? "sent" : "received");

  // Basic sanitization to prevent HTML injection in messages
  const safeMessage = message.replace(/</g, "&lt;").replace(/>/g, "&gt;");

  bubble.innerHTML = `
    <strong>${displayName}</strong><br>
    ${safeMessage}<br>
    <small style="opacity:0.7; font-size: 10px;">${timestamp || ""}</small>
  `;

  container.style.justifyContent = isMine ? "flex-end" : "flex-start";

  container.appendChild(bubble);
  chatDiv.appendChild(container);

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

/* LOGOUT */
async function logout() {
  try {
    await fetch("https://text-talk1.onrender.com/api/logout", {
      method: "POST",
      credentials: "include"
    });
  } catch (e) {
    // Continue with logout even if API fails
    console.error(e);
  }

  localStorage.removeItem("username");
  window.location.href = "login.html";
}

/* INIT */
loadUsers();
</script>

</body>
</html>
